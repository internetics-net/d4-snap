name: Build, Release and Publish

on:
  push:
    tags:
      - "v*"        # triggers when you push a tag like v1.2.3
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v2

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest

  build-exe:
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v2

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Get version and OS info
        id: meta
        run: |
          $version = (Select-String -Path pyproject.toml -Pattern '^version = "(.+)"').Matches.Groups[1].Value
          $build = [System.Environment]::OSVersion.Version.Build
          $osTag = if ($build -ge 22000) { "win11" } else { "win10" }
          $arch = if ([System.Environment]::Is64BitOperatingSystem) { "x64" } else { "x86" }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "OS_TAG=$osTag" >> $env:GITHUB_OUTPUT
          echo "ARCH=$arch" >> $env:GITHUB_OUTPUT

      - name: Build EXE with PyInstaller
        run: poetry run pyinstaller d4-snap.spec --clean --distpath bin

      - name: Rename EXE
        run: |
          $name = "d4-snap-${{ steps.meta.outputs.VERSION }}-${{ steps.meta.outputs.OS_TAG }}-${{ steps.meta.outputs.ARCH }}.exe"
          Rename-Item -Path "bin/d4-snap.exe" -NewName $name

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: bin/*.exe

  release:
    runs-on: ubuntu-latest
    needs: build-exe
    permissions:
      contents: write

    steps:
      - name: Download built EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v2

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
